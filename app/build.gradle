plugins {
    id 'com.android.application'
}

android {
    namespace 'com.phonetroller'
    compileSdk 35

    defaultConfig {
        applicationId 'com.phonetroller'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '0.1.0-placeholder'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
